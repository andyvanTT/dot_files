# Enable mouse support (click, scroll, resize panes)
set -g mouse on

# Use vi keys in copy mode
setw -g mode-keys vi

# Copy to system clipboard (vi-style)
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard -in"

# Start windows and panes at 1 (easier keyboard reach)
set -g base-index 1
setw -g pane-base-index 1

